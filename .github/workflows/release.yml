name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (without the leading v), e.g. 1.0.0'
        required: true

env:
  FLUTTER_VERSION: '3.35.1'

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - id: resolve
        # Tag v1.2.3 -> 1.2.3. Manual runs take the version from the input.
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

  android:
    name: Android (signed APK)
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # The keystore is not in git. Restore it from the secrets so the release
      # APK carries the same signature as the local builds - otherwise it will
      # not install over an existing GleeLight installation.
      - name: Restore signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 is not set. Add the signing secrets to the repository."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Verify it is signed with the release key
        # A silent fallback to the debug key would produce an APK that cannot be
        # installed over an existing one. Fail loudly instead of shipping it.
        run: |
          APKSIGNER=$(ls "$ANDROID_HOME"/build-tools/*/apksigner | tail -1)
          "$APKSIGNER" verify --print-certs build/app/outputs/flutter-apk/app-release.apk | tee certs.txt
          if grep -qi "CN=Android Debug" certs.txt; then
            echo "::error::APK was signed with the debug key, not the release key."
            exit 1
          fi

      - name: Name the artifact
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             gleelight-${{ needs.version.outputs.version }}-android-arm64.apk

      - uses: actions/upload-artifact@v7
        with:
          name: android
          path: gleelight-*.apk
          if-no-files-found: error

      - name: Remove signing material
        if: always()
        run: rm -f android/app/upload-keystore.jks android/key.properties

  windows:
    name: Windows
    needs: version
    # NOT windows-latest: that image now ships Visual Studio 2026 (major 18).
    # Flutter 3.35.1 only maps major 17 to a CMake generator and silently falls
    # back to "Visual Studio 16 2019" for anything newer, so CMake then goes
    # looking for a VS 2019 that is not there. flutter doctor still reports the
    # toolchain as fine, which makes this fail in a confusing way.
    # Pin to the image whose VS this Flutter version understands.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Toolchain diagnostics
        run: flutter doctor -v

      - name: Build
        run: flutter build windows --release

      - name: Zip the runner directory
        shell: pwsh
        run: |
          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath gleelight-${{ needs.version.outputs.version }}-windows-x64.zip

      - uses: actions/upload-artifact@v7
        with:
          name: windows
          path: gleelight-*.zip
          if-no-files-found: error

  ios:
    name: iOS (unsigned, build proof only)
    needs: version
    runs-on: macos-latest
    # There is no Apple Developer account, so this build cannot be signed and the
    # result is NOT installable. It only proves the code still compiles for iOS,
    # and it must never block a release.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build (no code signing)
        run: flutter build ios --release --no-codesign

      - name: Zip the app bundle
        run: |
          cd build/ios/iphoneos
          zip -r "$GITHUB_WORKSPACE/gleelight-${{ needs.version.outputs.version }}-ios-unsigned.zip" Runner.app

      - uses: actions/upload-artifact@v7
        with:
          name: ios
          path: gleelight-*.zip
          if-no-files-found: error

  release:
    name: Publish release
    needs: [version, android, windows, ios]
    # ios may fail; a release without it is still worth publishing.
    if: always() && needs.android.result == 'success' && needs.windows.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List what we are about to publish
        run: ls -la artifacts

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: GleeLight ${{ needs.version.outputs.version }}
          generate_release_notes: true
          files: artifacts/*
          body: |
            ## Downloads

            | Platform | File | Notes |
            |---|---|---|
            | Android | `gleelight-${{ needs.version.outputs.version }}-android-arm64.apk` | Signed, install directly on the device |
            | Windows | `gleelight-${{ needs.version.outputs.version }}-windows-x64.zip` | Unzip and run `GleeLight.exe` |
            | iOS | `gleelight-${{ needs.version.outputs.version }}-ios-unsigned.zip` | **Unsigned build proof — not installable.** No Apple Developer account. |

            GleeLight controls Yeelight lamps entirely over the local network, with no cloud
            account. Enable "LAN Control" for each lamp in the Yeelight app first.
